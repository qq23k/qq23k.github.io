<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Маньяк крови2005 </title>
    <style>
        /* Основные сбросы и фон */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: #f3f4f6;
            background: radial-gradient(circle at top left, rgba(121, 134, 255, 0.24), transparent 30%),
                        radial-gradient(circle at bottom right, rgba(68, 199, 255, 0.18), transparent 28%),
                        linear-gradient(180deg, #0d111e 0%, #121826 35%, #0b0f17 100%);
            overflow: hidden;
        }

        /* Анимация мягкого свечения */
        @keyframes glowBG {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -8px); }
        }

        .background-glow {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at 20% 20%, rgba(113, 103, 237, 0.14), transparent 18%),
                        radial-gradient(circle at 80% 70%, rgba(32, 205, 255, 0.12), transparent 22%);
            filter: blur(40px);
            animation: glowBG 18s ease-in-out infinite;
        }

        /* Карточка био */
        .card {
            position: relative;
            background: rgba(18, 24, 38, 0.62);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: 32px;
            padding: 42px 34px;
            width: 100%;
            max-width: 430px;
            text-align: center;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Аватарка */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Никнейм и био */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        p.bio {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Кнопки ссылок */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: block;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* Тег дискорда */
        .discord-tag {
            margin-top: 25px;
            padding: 8px 12px;
            background: rgba(88, 101, 242, 0.2);
            border: 1px solid rgba(88, 101, 242, 0.4);
            border-radius: 20px;
            display: inline-block;
            font-size: 0.85rem;
            color: #5865F2;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="background-glow"></div>

    <div class="card">
        <!-- Твоя аватарка (вставь прямую ссылку на картинку) -->
        <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">

        <!-- Твой ник -->
        <h1>Маняьк крови2005</h1>

        <!-- Краткое био -->
        <p class="bio">Я КРУТОЙ</p>

        <!-- Твои ссылки -->
        <div class="links">
            <a href="https://t.me/your_username" target="_blank" class="link-btn">Telegram</a>
            <a href="https://steamcommunity.com" target="_blank" class="link-btn">Steam Profile</a>
            <a href="https://twitch.tv" target="_blank" class="link-btn">Twitch</a>
            <a href="https://github.com" target="_blank" class="link-btn">GitHub</a>
        </div>

        <!-- Дискорд тег -->
        <div class="discord-tag">
            по вопросам пешите сюда @mydodir
        </div>
    </div>

</body>
</html>
